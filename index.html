<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Partículas Interactivas 3D - Gestos</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        canvas {
            display: block;
        }
        #video-container {
            position: absolute;
            bottom: 20px;
            left: 20px;
            width: 200px;
            height: 150px;
            border-radius: 10px;
            overflow: hidden;
            border: 2px solid rgba(255, 255, 255, 0.2);
            z-index: 10;
            display: none; /* Oculto por defecto para mantener el estilo minimalista */
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1); /* Efecto espejo */
        }
        #ui-container {
            position: absolute;
            bottom: 20px;
            right: 20px;
            z-index: 10;
        }
        button {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            backdrop-filter: blur(5px);
            transition: background 0.3s;
        }
        button:hover {
            background: rgba(255, 255, 255, 0.3);
        }
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 1.2rem;
            z-index: 20;
            pointer-events: none;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dat-gui/0.7.9/dat.gui.min.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
</head>
<body>

    <div id="loading">Cargando modelo de IA y cámara...</div>

    <div id="video-container">
        <video id="input_video" autoplay playsinline></video>
    </div>

    <div id="ui-container">
        <button id="fullscreen-btn">Pantalla Completa</button>
    </div>

    <script>
        // ==========================================
        // 1. CONFIGURACIÓN THREE.JS
        // ==========================================
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 50;

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // Variables de Partículas
        let particles, geometry, materials;
        let originalPositions = [];
        const particleCount = 15000;

        // Configuración de UI interactiva
        const params = {
            color: '#00ffff',
            pattern: 'Esfera',
            particleSize: 0.15,
            showCamera: false
        };

        function createParticles(pattern) {
            if (particles) scene.remove(particles);

            geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(particleCount * 3);
            originalPositions = new Float32Array(particleCount * 3);

            for (let i = 0; i < particleCount * 3; i += 3) {
                let x, y, z;

                if (pattern === 'Esfera') {
                    const phi = Math.acos(-1 + (2 * i / 3) / particleCount);
                    const theta = Math.sqrt(particleCount * Math.PI) * phi;
                    const radius = 20;
                    x = radius * Math.cos(theta) * Math.sin(phi);
                    y = radius * Math.sin(theta) * Math.sin(phi);
                    z = radius * Math.cos(phi);
                } else if (pattern === 'Cubo') {
                    const size = 30;
                    x = (Math.random() - 0.5) * size;
                    y = (Math.random() - 0.5) * size;
                    z = (Math.random() - 0.5) * size;
                } else { // Galaxia
                    const radius = Math.random() * 30;
                    const theta = radius * 0.5 + Math.random() * Math.PI * 2;
                    x = Math.cos(theta) * radius;
                    y = (Math.random() - 0.5) * 5; // Grosor
                    z = Math.sin(theta) * radius;
                }

                positions[i] = x;
                positions[i + 1] = y;
                positions[i + 2] = z;

                originalPositions[i] = x;
                originalPositions[i + 1] = y;
                originalPositions[i + 2] = z;
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));

            materials = new THREE.PointsMaterial({
                color: new THREE.Color(params.color),
                size: params.particleSize,
                transparent: true,
                opacity: 0.8,
                blending: THREE.AdditiveBlending,
                depthWrite: false
            });

            particles = new THREE.Points(geometry, materials);
            scene.add(particles);
        }

        createParticles(params.pattern);

        // ==========================================
        // 2. INTERFAZ DE USUARIO (dat.gui)
        // ==========================================
        const gui = new dat.GUI();
        gui.addColor(params, 'color').name('Color').onChange(c => materials.color.setHex(c.replace('#', '0x')));
        gui.add(params, 'pattern', ['Esfera', 'Cubo', 'Galaxia']).name('Patrón').onChange(p => createParticles(p));
        gui.add(params, 'particleSize', 0.05, 0.5).name('Tamaño').onChange(s => materials.size = s);
        gui.add(params, 'showCamera').name('Ver Cámara').onChange(v => {
            document.getElementById('video-container').style.display = v ? 'block' : 'none';
        });

        // ==========================================
        // 3. MEDIAPIPE Y RECONOCIMIENTO DE GESTOS
        // ==========================================
        const videoElement = document.getElementById('input_video');
        let targetGestureValue = 0; // 0 (Cerrado) a 1 (Abierto)
        let currentGestureValue = 0; // Para el Lerp (suavizado)

        const hands = new Hands({
            locateFile: (file) => {
                return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
            }
        });

        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 1,
            minDetectionConfidence: 0.7,
            minTrackingConfidence: 0.7
        });

        hands.onResults((results) => {
            // Ocultar mensaje de carga
            document.getElementById('loading').style.display = 'none';

            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const landmarks = results.multiHandLandmarks[0];
                
                // Puntos clave: 4 (Punta del pulgar), 8 (Punta del índice)
                const thumbTip = landmarks[4];
                const indexTip = landmarks[8];

                // Calcular distancia Euclidiana
                const dx = thumbTip.x - indexTip.x;
                const dy = thumbTip.y - indexTip.y;
                const distance = Math.sqrt(dx * dx + dy * dy);

                // Normalizar la distancia (ajusta estos valores según pruebas)
                // 0.03 suele ser cerrado (pellizco), 0.15+ es abierto
                let normalized = (distance - 0.03) / (0.15 - 0.03);
                targetGestureValue = Math.max(0, Math.min(1, normalized)); 
            } else {
                // Si no hay mano, volver a estado cerrado o neutral lentamente
                targetGestureValue = 0.5; 
            }
        });

        const camera_mp = new Camera(videoElement, {
            onFrame: async () => {
                await hands.send({image: videoElement});
            },
            width: 320,
            height: 240
        });
        camera_mp.start();

        // ==========================================
        // 4. BUCLE DE ANIMACIÓN
        // ==========================================
        function animate() {
            requestAnimationFrame(animate);

            // Suavizado (Lerp) del valor del gesto para evitar tirones bruscos
            currentGestureValue += (targetGestureValue - currentGestureValue) * 0.1;

            if (geometry) {
                const positions = geometry.attributes.position.array;
                
                // Animar partículas basándose en el gesto
                for (let i = 0; i < particleCount * 3; i += 3) {
                    const ox = originalPositions[i];
                    const oy = originalPositions[i + 1];
                    const oz = originalPositions[i + 2];

                    // Dispersión/Contracción matemática simple
                    // currentGestureValue = 0 (contraído), 1 (disperso)
                    const scale = 0.2 + (currentGestureValue * 1.5); 
                    
                    positions[i] = ox * scale;
                    positions[i + 1] = oy * scale;
                    positions[i + 2] = oz * scale;
                }
                geometry.attributes.position.needsUpdate = true;
            }

            // Rotación suave de todo el sistema
            particles.rotation.y += 0.002;
            particles.rotation.x += 0.001;

            renderer.render(scene, camera);
        }
        animate();

        // ==========================================
        // 5. RESPONSIVIDAD Y PANTALLA COMPLETA
        // ==========================================
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        document.getElementById('fullscreen-btn').addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.body.requestFullscreen().catch(err => {
                    console.log(`Error intentando entrar en pantalla completa: ${err.message}`);
                });
            } else {
                document.exitFullscreen();
            }
        });
    </script>
</body>
</html>
