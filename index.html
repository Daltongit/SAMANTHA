<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Para Samantha</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: sans-serif; touch-action: none; }
        canvas { display: block; }
        #video-container { position: absolute; bottom: 20px; left: 20px; width: 150px; height: 110px; border-radius: 10px; overflow: hidden; border: 2px solid rgba(255, 255, 255, 0.2); z-index: 10; display: none; pointer-events: none; }
        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        #ui-container { position: absolute; bottom: 20px; right: 20px; z-index: 10; display: flex; gap: 10px; }
        button { background: rgba(255, 255, 255, 0.1); color: white; border: 1px solid rgba(255, 255, 255, 0.3); padding: 10px 15px; border-radius: 5px; cursor: pointer; backdrop-filter: blur(5px); font-size: 14px; transition: 0.3s; }
        button:hover { background: rgba(255, 255, 255, 0.3); }
        #loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; font-size: 1.2rem; z-index: 20; text-align: center; pointer-events: none; }
        @media (max-width: 768px) { #video-container { width: 90px; height: 65px; } .dg.ac { display: none !important; } }
    </style>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dat-gui/0.7.9/dat.gui.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
</head>
<body>

    <div id="loading">Iniciando reconocimiento espacial...<br><small>Permite el acceso a la cámara</small></div>

    <div id="video-container"><video id="input_video" autoplay playsinline></video></div>
    <div id="ui-container"><button id="fullscreen-btn">Pantalla Completa</button></div>

    <script>
        // ==========================================
        // DETECCIÓN INTELIGENTE DE HARDWARE
        // ==========================================
        const isMobile = window.innerWidth < 768;
        const particleCount = isMobile ? 12000 : 40000; 

        // ==========================================
        // 1. CONFIGURACIÓN THREE.JS
        // ==========================================
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        let particles, geometry, shaderMaterial;
        let starFieldParticles, comets;
        let cometsVelocity = [];

        let shapeRings = new Float32Array(particleCount * 3);
        let shapeText1 = new Float32Array(particleCount * 3);
        let shapeText2 = new Float32Array(particleCount * 3);
        let shapePoll = new Float32Array(particleCount * 3);
        let shapeHeart = new Float32Array(particleCount * 3);
        let shapeSad = new Float32Array(particleCount * 3);
        let randoms = new Float32Array(particleCount);
        let randOffsets = new Float32Array(particleCount * 3); 

        // Colores románticos profundos y vibrantes
        const params = { baseColor: '#ff0055', heartColor: '#ff00ff', sadColor: '#0055ff' };
        let currentColor = new THREE.Color(params.baseColor);
        let targetColor = new THREE.Color(params.baseColor);
        
        let targetScale = 1.0;
        let currentScale = 1.0;

        // ==========================================
        // 2. GENERADOR DE FORMAS
        // ==========================================
        // OPTIMIZACIÓN: Los textos no añaden aleatoriedad en Z
        function createTextShape(textLine1, textLine2, targetArray, fontSize = 70) {
            const canvas = document.createElement('canvas');
            canvas.width = 800; canvas.height = 300;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#000'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#fff'; ctx.font = `bold ${fontSize}px Arial`;
            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            
            ctx.fillText(textLine1, canvas.width/2, canvas.height/2 - 40);
            if(textLine2) ctx.fillText(textLine2, canvas.width/2, canvas.height/2 + 40);

            const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
            const validPoints = [];

            for (let y = 0; y < canvas.height; y += 3) {
                for (let x = 0; x < canvas.width; x += 3) {
                    if (imgData[(y * canvas.width + x) * 4] > 128) {
                        // Texto ultra preciso, profundidad mínima
                        validPoints.push({ x: (x - canvas.width / 2) * 0.15, y: -(y - canvas.height / 2) * 0.15, z: (Math.random() - 0.5) * 0.1 });
                    }
                }
            }
            fillArrayWithPoints(validPoints, targetArray, 0.1);
        }

        function createEmojiShape(emoji, targetArray) {
            const canvas = document.createElement('canvas');
            canvas.width = 400; canvas.height = 400;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#000'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#fff'; ctx.font = '200px Arial';
            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.fillText(emoji, 200, 200);

            const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
            const validPoints = [];
            for (let y = 0; y < canvas.height; y += 3) {
                for (let x = 0; x < canvas.width; x += 3) {
                    if (imgData[(y * canvas.width + x) * 4] > 128) {
                        validPoints.push({ x: (x - 200) * 0.2, y: -(y - 200) * 0.2, z: (Math.random() - 0.5) * 2 });
                    }
                }
            }
            fillArrayWithPoints(validPoints, targetArray, 0.5);
        }

        function fillArrayWithPoints(pointsArray, targetArray, maxNoise) {
            for (let i = 0; i < particleCount; i++) {
                const pt = pointsArray[i % pointsArray.length];
                // Reducimos el ruido de formación para mejor legibilidad
                targetArray[i * 3] = pt.x + (Math.random() - 0.5) * maxNoise;
                targetArray[i * 3 + 1] = pt.y + (Math.random() - 0.5) * maxNoise;
                targetArray[i * 3 + 2] = pt.z;
                randoms[i] = Math.random();
                randOffsets[i * 3] = Math.random() * Math.PI * 2;
                randOffsets[i * 3 + 1] = Math.random() * Math.PI * 2;
                randOffsets[i * 3 + 2] = Math.random() * Math.PI * 2;
            }
        }

        // --- NUEVA FIGURA: ESFERA CENTRAL SÓLIDA + ANILLOS DENSOS ---
        for (let i = 0; i < particleCount; i++) {
            let type = Math.random();
            if (type < 0.35) { // Aumentamos la densidad del núcleo al 35%
                // Esfera Central "Sólida como gema"
                let phi = Math.acos(-1 + (2 * i) / (particleCount * 0.35));
                let theta = Math.sqrt(particleCount * 0.35 * Math.PI) * phi;
                // Radio ultra condensado y sin fuzz para solidez
                let radius = 6.0 + (Math.random() - 0.5) * 0.2; 
                shapeRings[i * 3] = radius * Math.cos(theta) * Math.sin(phi);
                shapeRings[i * 3 + 1] = radius * Math.sin(theta) * Math.sin(phi);
                shapeRings[i * 3 + 2] = radius * Math.cos(phi);
            } else { 
                // Anillos Cortos y Densos, planos como disco de acreción
                let ringType = Math.random();
                let radius;
                if (ringType < 0.4) radius = 10 + Math.random() * 2; // Más cercanos al núcleo
                else if (ringType < 0.7) radius = 14 + Math.random() * 3;
                else radius = 20 + Math.random() * 3;
                let theta = Math.random() * Math.PI * 2;
                shapeRings[i * 3] = radius * Math.cos(theta);
                shapeRings[i * 3 + 1] = (Math.random() - 0.5) * 0.6; // Ultra planos
                shapeRings[i * 3 + 2] = radius * Math.sin(theta);
            }
        }

        createTextShape("Te Quiero", "Samantha", shapeText1);
        createTextShape("Chiquilla", "Preciosa", shapeText2);
        createTextShape("¿TE GUSTÓ?", "< SÍ          NO >", shapePoll, 50);
        createEmojiShape("❤️", shapeHeart);
        createEmojiShape("😢", shapeSad);

        // ================= ==========================
        // 3. SISTEMA DE PARTÍCULAS PRINCIPAL (SHADER ESTABLE Y FLUIDO)
        // ==========================================
        geometry = new THREE.BufferGeometry();
        let currentPositions = new Float32Array(shapeRings);
        geometry.setAttribute('position', new THREE.BufferAttribute(currentPositions, 3));
        geometry.setAttribute('aTarget', new THREE.BufferAttribute(new Float32Array(shapeRings), 3));
        geometry.setAttribute('aRandom', new THREE.BufferAttribute(randoms, 1));
        geometry.setAttribute('aRandOffset', new THREE.BufferAttribute(randOffsets, 3)); 

        shaderMaterial = new THREE.ShaderMaterial({
            uniforms: {
                uColor: { value: currentColor },
                uSize: { value: 12.0 * Math.min(window.devicePixelRatio, 2) },
                uMorph: { value: 0.0 },
                uScale: { value: 1.0 },
                uTime: { value: 0.0 },
                uIsText: { value: 0.0 } // NUEVO UNIFORME DE Detección de texto
            },
            vertexShader: `
                uniform float uMorph;
                uniform float uSize;
                uniform float uScale;
                uniform float uTime;
                uniform float uIsText; // NUEVO UNIFORME
                attribute vec3 aTarget;
                attribute float aRandom;
                attribute vec3 aRandOffset; 

                void main() {
                    vec3 finalPos = mix(position, aTarget, uMorph);
                    
                    // --- FLUIDEZ ESTABLE Y LENTA MEDIANTE ONDAS ---
                    // Se aplica la suavidad de un fluido lento.
                    vec3 fluidMotion = vec3(
                        sin(finalPos.y * 0.1 + uTime * 1.5 + aRandOffset.x),
                        cos(finalPos.x * 0.1 + uTime * 1.5 + aRandOffset.y),
                        sin(finalPos.z * 0.1 + uTime * 1.5 + aRandOffset.z)
                    ) * 0.35; // Amplitud controlada para fluidez sin borrosidad

                    // DETECCION DE TEXTO: El movimiento aleatorio se apaga si es texto.
                    // Si es texto (uIsText es 1), fluidMotionMult es 0. 
                    // Si no es texto, es 1.
                    float fluidMotionMult = 1.0 - uIsText;

                    // El movimiento inactivo es sutil en los anillos.
                    // Aumentamos el movimiento inactivo cuando uMorph se acerca a 1.0 (para emojis)
                    float morphMult = mix(1.0, 3.0, uMorph); 
                    
                    // Solo aplicamos movimiento inactivo si NO es texto y está en estado de fluido.
                    finalPos += fluidMotion * morphMult * fluidMotionMult;
                    
                    finalPos *= uScale;
                    
                    vec4 mvPosition = modelViewMatrix * vec4(finalPos, 1.0);
                    gl_PointSize = uSize * (20.0 / -mvPosition.z) * (0.5 + aRandom * 0.5); 
                    gl_Position = projectionMatrix * mvPosition;
                }
            `,
            fragmentShader: `
                uniform vec3 uColor;
                void main() {
                    float distance = length(gl_PointCoord - vec2(0.5));
                    if (distance > 0.5) discard;
                    float alpha = (0.5 - distance) * 2.0; 
                    gl_FragColor = vec4(uColor, alpha * 0.9);
                }
            `,
            transparent: true, depthWrite: false, blending: THREE.AdditiveBlending
        });

        particles = new THREE.Points(geometry, shaderMaterial);
        particles.rotation.x = Math.PI / 3; 
        scene.add(particles);

        // ==========================================
        // 4. FONDO ESPACIAL: ESTRELLAS Y COMETAS
        // ==========================================
        function createStarField() {
            const count = 5000;
            const starGeometry = new THREE.BufferGeometry();
            const starPositions = new Float32Array(count * 3);
            for (let i = 0; i < count; i++) {
                starPositions[i * 3] = (Math.random() - 0.5) * 2000;
                starPositions[i * 3 + 1] = (Math.random() - 0.5) * 2000;
                starPositions[i * 3 + 2] = (Math.random() - 0.5) * 2000 - 500; 
            }
            starGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
            const starMaterial = new THREE.ShaderMaterial({
                uniforms: { uTime: { value: 0.0 } },
                vertexShader: `
                    uniform float uTime;
                    void main() {
                        vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
                        // Ligero parpadeo
                        float alpha = 0.5 + 0.5 * sin(position.x * 0.01 + uTime * 2.0);
                        gl_PointSize = 1.5 * (1.0 + alpha); 
                        gl_Position = projectionMatrix * mvPosition;
                    }
                `,
                fragmentShader: `
                    void main() {
                        gl_FragColor = vec4(1.0, 1.0, 1.0, 0.8);
                    }
                `,
                transparent: true, depthWrite: false, blending: THREE.AdditiveBlending
            });
            starFieldParticles = new THREE.Points(starGeometry, starMaterial);
            scene.add(starFieldParticles);
        }
        createStarField();

        function createComets() {
            const count = 30; // Menor cantidad pero moviéndose rápido
            const cometGeometry = new THREE.BufferGeometry();
            const cometPositions = new Float32Array(count * 6); 
            for (let i = 0; i < count; i++) {
                let x = (Math.random() - 0.5) * 1000;
                let y = (Math.random() - 0.5) * 1000;
                let z = (Math.random() - 0.5) * 1000 - 300;
                cometPositions[i * 6] = x;
                cometPositions[i * 6 + 1] = y;
                cometPositions[i * 6 + 2] = z;
                cometPositions[i * 6 + 3] = x;
                cometPositions[i * 6 + 4] = y;
                cometPositions[i * 6 + 5] = z;
                // Cometas mucho más rápidos (Triple de velocidad)
                cometsVelocity.push(new THREE.Vector3((Math.random() - 0.5) * 120.0, (Math.random() - 0.5) * 120.0, (Math.random() - 0.5) * 120.0));
            }
            cometGeometry.setAttribute('position', new THREE.BufferAttribute(cometPositions, 3));
            const cometMaterial = new THREE.ShaderMaterial({
                vertexShader: `
                    void main() {
                        vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
                        gl_PointSize = 2.0; 
                        gl_Position = projectionMatrix * mvPosition;
                    }
                `,
                fragmentShader: `
                    void main() {
                        gl_FragColor = vec4(1.0, 1.0, 1.0, 1.0);
                    }
                `,
                transparent: true, depthWrite: false, blending: THREE.AdditiveBlending
            });
            comets = new THREE.Points(cometGeometry, cometMaterial);
            scene.add(comets);
        }
        createComets();

        function updateComets(delta) {
            const positions = comets.geometry.attributes.position.array;
            for (let i = 0; i < cometsVelocity.length; i++) {
                let vel = cometsVelocity[i];
                positions[i * 6] += vel.x * delta;
                positions[i * 6 + 1] += vel.y * delta;
                positions[i * 6 + 2] += vel.z * delta;
                // Cola sigue a la cabeza
                positions[i * 6 + 3] = positions[i * 6] - vel.x * 0.3;
                positions[i * 6 + 4] = positions[i * 6 + 1] - vel.y * 0.3;
                positions[i * 6 + 5] = positions[i * 6 + 2] - vel.z * 0.3;

                // Reset si salen de pantalla
                if (positions[i * 6] > 1000 || positions[i * 6] < -1000) positions[i * 6] = (Math.random() - 0.5) * 1000;
                if (positions[i * 6 + 1] > 1000 || positions[i * 6 + 1] < -1000) positions[i * 6 + 1] = (Math.random() - 0.5) * 1000;
                if (positions[i * 6 + 2] > 700 || positions[i * 6 + 2] < -1300) positions[i * 6 + 2] = (Math.random() - 0.5) * 1000 - 300;
            }
            comets.geometry.attributes.position.needsUpdate = true;
        }

        let activeShapeName = 'rings';
        
        // Actualizamos para gestionar legibilidad de texto
        function changeShape(newShapeArray, colorHex, shapeName, isText) {
            if (activeShapeName === shapeName) return;
            activeShapeName = shapeName;

            const pos = geometry.attributes.position.array;
            const target = geometry.attributes.aTarget.array;
            const morph = shaderMaterial.uniforms.uMorph.value;

            for(let i=0; i<particleCount*3; i++) {
                pos[i] = pos[i] + (target[i] - pos[i]) * morph;
                target[i] = newShapeArray[i];
            }
            
            geometry.attributes.position.needsUpdate = true;
            geometry.attributes.aTarget.needsUpdate = true;
            
            shaderMaterial.uniforms.uMorph.value = 0.0; 
            targetColor.setHex(colorHex.replace('#', '0x'));
            
            // Avisar al shader si es texto o no
            shaderMaterial.uniforms.uIsText.value = isText ? 1.0 : 0.0;
        }

        function ajustarPantalla() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            if (isMobile) {
                camera.position.z = 100; 
                shaderMaterial.uniforms.uSize.value = 18.0 * Math.min(window.devicePixelRatio, 2); 
            } else {
                camera.position.z = 60; 
                shaderMaterial.uniforms.uSize.value = 10.0 * Math.min(window.devicePixelRatio, 2);
            }
        }
        window.addEventListener('resize', ajustarPantalla);
        ajustarPantalla();

        // ==========================================
        // 5. LÓGICA DE MANOS Y ENCUESTA
        // ==========================================
        const videoElement = document.getElementById('input_video');
        let targetRotationX = Math.PI / 3;
        let targetRotationY = 0;
        
        let pollActive = false;
        let pollAnswered = false;

        function handleInteraction(event) {
            if (!pollActive || pollAnswered) return;
            let clientX = event.type.includes('touch') ? event.touches[0].clientX : event.clientX;
            if (clientX < window.innerWidth / 2) {
                pollAnswered = true;
                changeShape(shapeHeart, params.heartColor, 'heart', false);
            } else {
                pollAnswered = true;
                changeShape(shapeSad, params.sadColor, 'sad', false);
            }
            setTimeout(() => { 
                pollActive = false; 
                pollAnswered = false; 
                changeShape(shapeRings, params.baseColor, 'rings', false);
            }, 4000);
        }

        window.addEventListener('click', handleInteraction);
        window.addEventListener('touchstart', handleInteraction);

        const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
        hands.setOptions({ maxNumHands: 2, modelComplexity: isMobile ? 0 : 1, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });

        function getDistance(p1, p2) {
            return Math.hypot(p1.x - p2.x, p1.y - p2.y);
        }

        hands.onResults((results) => {
            document.getElementById('loading').style.display = 'none';
            if (pollActive) return;

            let totalFingersUp = 0;
            let indexFingerX = 0;
            let indexFingerY = 0;

            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                
                for (let i = 0; i < results.multiHandLandmarks.length; i++) {
                    const landmarks = results.multiHandLandmarks[i];
                    const wrist = landmarks[0]; 
                    
                    if (getDistance(wrist, landmarks[8]) > getDistance(wrist, landmarks[6])) totalFingersUp++;  
                    if (getDistance(wrist, landmarks[12]) > getDistance(wrist, landmarks[10])) totalFingersUp++; 
                    if (getDistance(wrist, landmarks[16]) > getDistance(wrist, landmarks[14])) totalFingersUp++; 
                    if (getDistance(wrist, landmarks[20]) > getDistance(wrist, landmarks[18])) totalFingersUp++; 
                    if (getDistance(wrist, landmarks[4]) > getDistance(wrist, landmarks[3]) * 1.1) totalFingersUp++;

                    if (i === 0) {
                        indexFingerX = landmarks[8].x;
                        indexFingerY = landmarks[8].y;
                    }
                }

                if (totalFingersUp >= 9) { 
                    pollActive = true;
                    targetRotationX = 0; targetRotationY = 0; targetScale = 1.0;
                    changeShape(shapePoll, params.baseColor, 'poll', true);
                } 
                else if (totalFingersUp === 0) {
                    targetScale = 0.3; 
                } 
                else if (totalFingersUp === 5) {
                    targetScale = 1.8; 
                } 
                else if (totalFingersUp === 1) {
                    targetScale = 1.0;
                    targetRotationY = (indexFingerX - 0.5) * Math.PI * 4;
                    targetRotationX = (indexFingerY - 0.5) * Math.PI * 2;
                    changeShape(shapeRings, params.baseColor, 'rings', false);
                } 
                else if (totalFingersUp === 2) {
                    targetRotationX = 0; targetRotationY = 0; targetScale = 1.0;
                    changeShape(shapeText1, params.baseColor, 'text1', true); 
                } 
                else if (totalFingersUp === 3) {
                    targetRotationX = 0; targetRotationY = 0; targetScale = 1.0;
                    changeShape(shapeText2, params.baseColor, 'text2', true); 
                }

            } else {
                targetRotationY += 0.005;
                targetScale = 1.0;
                changeShape(shapeRings, params.baseColor, 'rings', false);
            }
        });

        const camera_mp = new Camera(videoElement, { 
            onFrame: async () => { await hands.send({image: videoElement}); }, 
            width: isMobile ? 160 : 640, 
            height: isMobile ? 120 : 480 
        });
        camera_mp.start();

        // ==========================================
        // 6. ANIMACIÓN Y RENDERIZADO
        // ==========================================
        let clock = new THREE.Clock(); 

        function animate() {
            requestAnimationFrame(animate);
            let time = performance.now() * 0.001;
            let delta = clock.getDelta(); 

            shaderMaterial.uniforms.uTime.value = time;
            starFieldParticles.material.uniforms.uTime.value = time;
            
            updateComets(delta); 

            if (shaderMaterial.uniforms.uMorph.value < 1.0) {
                shaderMaterial.uniforms.uMorph.value += 0.04;
            }

            currentColor.lerp(targetColor, 0.05);
            shaderMaterial.uniforms.uColor.value.copy(currentColor);
            currentScale += (targetScale - currentScale) * 0.1;
            shaderMaterial.uniforms.uScale.value = currentScale;

            particles.rotation.x += (targetRotationX - particles.rotation.x) * 0.1;
            particles.rotation.y += (targetRotationY - particles.rotation.y) * 0.1;

            renderer.render(scene, camera);
        }
        animate();

        const gui = new dat.GUI();
        gui.add({ verCamara: false }, 'verCamara').name('Ver Cámara').onChange(v => document.getElementById('video-container').style.display = v ? 'block' : 'none');
        document.getElementById('fullscreen-btn').addEventListener('click', () => { if (!document.fullscreenElement) document.body.requestFullscreen(); else document.exitFullscreen(); });
    </script>
</body>
</html>
