<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Para Samantha</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: none;
        }
        canvas {
            display: block;
        }
        #video-container {
            position: absolute;
            bottom: 20px;
            left: 20px;
            width: 150px;
            height: 100px;
            border-radius: 10px;
            overflow: hidden;
            border: 2px solid rgba(255, 255, 255, 0.2);
            z-index: 10;
            display: none;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }
        #ui-container {
            position: absolute;
            bottom: 20px;
            right: 20px;
            z-index: 10;
            display: flex;
            gap: 10px;
        }
        button {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            backdrop-filter: blur(5px);
            transition: background 0.3s;
            font-size: 14px;
        }
        button:hover {
            background: rgba(255, 255, 255, 0.3);
        }
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 1.2rem;
            z-index: 20;
            pointer-events: none;
            text-align: center;
        }
        @media (max-width: 768px) {
            #video-container { width: 100px; height: 75px; }
            .dg.ac { display: none !important; }
        }
    </style>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dat-gui/0.7.9/dat.gui.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
</head>
<body>

    <div id="loading">Cargando magia ultra fluida...<br><small>Por favor, permite el acceso a la cámara</small></div>

    <div id="video-container">
        <video id="input_video" autoplay playsinline></video>
    </div>

    <div id="ui-container">
        <button id="fullscreen-btn">Pantalla Completa</button>
    </div>

    <script>
        // ==========================================
        // 1. CONFIGURACIÓN BÁSICA THREE.JS
        // ==========================================
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 60;

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        const particleCount = 12000;
        let particles, geometry, shaderMaterial;
        
        let shapeSphere = new Float32Array(particleCount * 3);
        let shapeText1 = new Float32Array(particleCount * 3);
        let shapeText2 = new Float32Array(particleCount * 3);
        let randoms = new Float32Array(particleCount); // Para darle un ligero brillo/movimiento individual

        const params = {
            color: '#ff0055',
            particleSize: 15.0, // Ajustado para shaders
            showCamera: false
        };

        // ==========================================
        // 2. GENERADOR DE FORMAS Y TEXTOS (Solo se ejecuta 1 vez)
        // ==========================================
        function createTextShape(text, targetArray) {
            const canvas = document.createElement('canvas');
            canvas.width = 800;
            canvas.height = 300;
            const ctx = canvas.getContext('2d');
            
            ctx.fillStyle = '#000000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#ffffff';
            ctx.font = 'bold 70px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            
            if(text.includes('Samantha')){
                ctx.fillText('Te Quiero', canvas.width/2, canvas.height/2 - 40);
                ctx.fillText('Samantha', canvas.width/2, canvas.height/2 + 40);
            } else {
                ctx.fillText('Chiquilla', canvas.width/2, canvas.height/2 - 40);
                ctx.fillText('Preciosa', canvas.width/2, canvas.height/2 + 40);
            }

            const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
            const validPoints = [];

            for (let y = 0; y < canvas.height; y += 3) {
                for (let x = 0; x < canvas.width; x += 3) {
                    const i = (y * canvas.width + x) * 4;
                    if (imgData[i] > 128) {
                        validPoints.push({
                            x: (x - canvas.width / 2) * 0.15,
                            y: -(y - canvas.height / 2) * 0.15,
                            z: (Math.random() - 0.5) * 2 
                        });
                    }
                }
            }

            for (let i = 0; i < particleCount; i++) {
                const point = validPoints[i % validPoints.length];
                targetArray[i * 3] = point.x + (Math.random() - 0.5) * 0.5;
                targetArray[i * 3 + 1] = point.y + (Math.random() - 0.5) * 0.5;
                targetArray[i * 3 + 2] = point.z;
                randoms[i] = Math.random();
            }
        }

        // Crear la esfera base
        for (let i = 0; i < particleCount; i++) {
            const phi = Math.acos(-1 + (2 * i) / particleCount);
            const theta = Math.sqrt(particleCount * Math.PI) * phi;
            const radius = 25;
            
            shapeSphere[i * 3] = radius * Math.cos(theta) * Math.sin(phi);
            shapeSphere[i * 3 + 1] = radius * Math.sin(theta) * Math.sin(phi);
            shapeSphere[i * 3 + 2] = radius * Math.cos(phi);
        }

        createTextShape("Te Quiero Samantha", shapeText1);
        createTextShape("Chiquilla Preciosa", shapeText2);

        geometry = new THREE.BufferGeometry();
        // A diferencia de antes, pasamos LAS TRES FORMAS a la memoria de la tarjeta gráfica a la vez
        geometry.setAttribute('position', new THREE.BufferAttribute(shapeSphere, 3));
        geometry.setAttribute('aText1', new THREE.BufferAttribute(shapeText1, 3));
        geometry.setAttribute('aText2', new THREE.BufferAttribute(shapeText2, 3));
        geometry.setAttribute('aRandom', new THREE.BufferAttribute(randoms, 1));

        // ==========================================
        // SHADERS MÁGICOS (Procesamiento directo en GPU)
        // ==========================================
        shaderMaterial = new THREE.ShaderMaterial({
            uniforms: {
                uColor: { value: new THREE.Color(params.color) },
                uSize: { value: params.particleSize * Math.min(window.devicePixelRatio, 2) },
                uWeightSphere: { value: 1.0 },
                uWeightText1: { value: 0.0 },
                uWeightText2: { value: 0.0 }
            },
            vertexShader: `
                uniform float uWeightSphere;
                uniform float uWeightText1;
                uniform float uWeightText2;
                uniform float uSize;
                
                attribute vec3 aText1;
                attribute vec3 aText2;
                attribute float aRandom;

                void main() {
                    // La GPU mezcla las posiciones instantáneamente sin loops pesados
                    vec3 finalPos = (position * uWeightSphere) + 
                                    (aText1 * uWeightText1) + 
                                    (aText2 * uWeightText2);

                    vec4 mvPosition = modelViewMatrix * vec4(finalPos, 1.0);
                    gl_PointSize = uSize * (20.0 / -mvPosition.z) * (0.5 + aRandom * 0.5); // Efecto de profundidad y tamaño variado
                    gl_Position = projectionMatrix * mvPosition;
                }
            `,
            fragmentShader: `
                uniform vec3 uColor;
                void main() {
                    // Dibuja círculos suaves en lugar de cuadrados duros
                    float distance = length(gl_PointCoord - vec2(0.5));
                    if (distance > 0.5) discard;
                    
                    float alpha = (0.5 - distance) * 2.0; // Borde difuminado
                    gl_FragColor = vec4(uColor, alpha * 0.9);
                }
            `,
            transparent: true,
            depthWrite: false,
            blending: THREE.AdditiveBlending
        });

        particles = new THREE.Points(geometry, shaderMaterial);
        scene.add(particles);

        // Interfaz
        const gui = new dat.GUI();
        gui.addColor(params, 'color').name('Color').onChange(c => shaderMaterial.uniforms.uColor.value.setHex(c.replace('#', '0x')));
        gui.add(params, 'showCamera').name('Ver Cámara').onChange(v => {
            document.getElementById('video-container').style.display = v ? 'block' : 'none';
        });

        // ==========================================
        // 3. MEDIAPIPE OPTIMIZADO
        // ==========================================
        const videoElement = document.getElementById('input_video');
        
        let targetRotationX = 0;
        let targetRotationY = 0;
        let currentRotationX = 0;
        let currentRotationY = 0;
        
        // Pesos objetivo para la transición
        let targetWeights = { sphere: 1.0, text1: 0.0, text2: 0.0 };

        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 0, // BAJAMOS A 0 PARA MÁXIMA VELOCIDAD EN CELULARES
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });

        hands.onResults((results) => {
            document.getElementById('loading').style.display = 'none';

            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const landmarks = results.multiHandLandmarks[0];
                
                const palmX = landmarks[9].x - 0.5;
                const palmY = landmarks[9].y - 0.5;
                
                targetRotationY = palmX * Math.PI * 2;
                targetRotationX = palmY * Math.PI;

                let fingersUp = 0;
                if (landmarks[8].y < landmarks[6].y) fingersUp++;
                if (landmarks[12].y < landmarks[10].y) fingersUp++;
                if (landmarks[16].y < landmarks[14].y) fingersUp++;
                if (landmarks[20].y < landmarks[18].y) fingersUp++;

                if (fingersUp === 2) {
                    targetWeights = { sphere: 0, text1: 1, text2: 0 };
                    targetRotationX = 0; 
                    targetRotationY = 0;
                } else if (fingersUp === 3) {
                    targetWeights = { sphere: 0, text1: 0, text2: 1 };
                    targetRotationX = 0; 
                    targetRotationY = 0;
                } else {
                    targetWeights = { sphere: 1, text1: 0, text2: 0 };
                }

            } else {
                targetRotationY += 0.005;
                targetRotationX = 0;
                targetWeights = { sphere: 1, text1: 0, text2: 0 };
            }
        });

        const camera_mp = new Camera(videoElement, {
            onFrame: async () => {
                await hands.send({image: videoElement});
            },
            width: 160, // RESOLUCIÓN MÁS BAJA PARA CÁMARA = MÁS RENDIMIENTO
            height: 120
        });
        camera_mp.start();

        // ==========================================
        // 4. BUCLE DE ANIMACIÓN SÚPER LIGERO
        // ==========================================
        function animate() {
            requestAnimationFrame(animate);

            // Interpolación de pesos matemáticos (Solo 3 cálculos, en lugar de 36,000)
            shaderMaterial.uniforms.uWeightSphere.value += (targetWeights.sphere - shaderMaterial.uniforms.uWeightSphere.value) * 0.1;
            shaderMaterial.uniforms.uWeightText1.value += (targetWeights.text1 - shaderMaterial.uniforms.uWeightText1.value) * 0.1;
            shaderMaterial.uniforms.uWeightText2.value += (targetWeights.text2 - shaderMaterial.uniforms.uWeightText2.value) * 0.1;

            currentRotationX += (targetRotationX - currentRotationX) * 0.1;
            currentRotationY += (targetRotationY - currentRotationY) * 0.1;
            
            particles.rotation.x = currentRotationX;
            particles.rotation.y = currentRotationY;

            renderer.render(scene, camera);
        }
        animate();

        // ==========================================
        // 5. RESPONSIVIDAD Y PANTALLA COMPLETA
        // ==========================================
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        document.getElementById('fullscreen-btn').addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.body.requestFullscreen().catch(err => console.log(err));
            } else {
                document.exitFullscreen();
            }
        });
    </script>
</body>
</html>
